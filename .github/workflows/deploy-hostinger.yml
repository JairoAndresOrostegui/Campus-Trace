name: Publish web build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-web-build
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Add Apache SPA rewrite
        run: |
          cat > build/web/.htaccess <<'EOF'
          <IfModule mod_headers.c>
            <FilesMatch "^(index\.html|flutter_bootstrap\.js|version\.json|manifest\.json)$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
              Header set Pragma "no-cache"
              Header set Expires "0"
            </FilesMatch>

            <FilesMatch "\.(js|css|wasm|png|jpg|jpeg|gif|svg|ico|ttf|otf|woff|woff2)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
          </IfModule>

          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            RewriteRule ^ index.html [L]
          </IfModule>
          EOF

      - name: Publish build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: hostinger-deploy
          publish_dir: build/web
          force_orphan: true
