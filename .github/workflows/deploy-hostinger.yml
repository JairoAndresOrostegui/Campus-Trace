name: Deploy web to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Add Apache SPA rewrite
        run: |
          cat > build/web/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            RewriteRule ^ index.html [L]
          </IfModule>
          EOF

      - name: Deploy to Hostinger
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          REMOTE_HOST: 145.223.106.17
          REMOTE_USER: u851578647
          REMOTE_PORT: 65002
          SOURCE: build/web/
          TARGET: /home/u851578647/domains/bitacorapedagogica.com/public_html/
          ARGS: -rlgoDzvc
